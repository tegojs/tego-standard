name: Tego Image Nightly

on:
  workflow_dispatch:
    inputs:
      docker_tag:
        description: >
          Docker tag (optional, auto-calculated if empty).
          🔹 Production tags (v1.0.0) remain unique.
          🔹 Test tags get timestamp+commit SHA appended.
          🔹 Rules:
            🔸 1) From tag: use tag name (production tags stay unique);
            🔸 2) From main: use "main-date-commit" (e.g., main-20251112-abc1234) + latest;
            🔸 3) From other branches: use "date-timestamp-commit-branch" (e.g., 20251112-143022-abc1234-feat-some) + latest
        required: false
        default: ''

run-name: "Tego Image Nightly - Tag: ${{ github.event.inputs.docker_tag || (github.ref_type == 'tag' && github.ref_name) ||'auto-calculated-tag' }}"

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    outputs:
      docker_tag: ${{ steps.set_tag.outputs.tag }}
      should_comment_pr: ${{ steps.set_tag.outputs.should_comment_pr }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set default docker tag
        id: set_tag
        run: |
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          TIMESTAMP=$(date +%H%M%S)

          if [ -n "${{ github.event.inputs.docker_tag }}" ]; then
            # 如果用户提供了 docker_tag
            USER_TAG="${{ github.event.inputs.docker_tag }}"

            # 检查是否是生产 tag（以 v 开头，如 v1.0.0）
            if echo "$USER_TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+'; then
              # 生产 tag，保持唯一，不添加时间戳
              echo "tag=${USER_TAG}" >> $GITHUB_OUTPUT
            else
              # 测试 tag，添加时间戳和 commit SHA 保持唯一性
              echo "tag=${USER_TAG}-${TIMESTAMP}-${SHORT_SHA}" >> $GITHUB_OUTPUT
            fi

            # 检查是否需要评论 PR（不是 tag 且不是 main）
            if [ "${{ github.ref_type }}" != "tag" ] && [ "${{ github.ref_name }}" != "main" ]; then
              echo "should_comment_pr=true" >> $GITHUB_OUTPUT
            else
              echo "should_comment_pr=false" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            # 如果是 tag，检查是否是生产 tag
            TAG_NAME="${{ github.ref_name }}"
            if echo "$TAG_NAME" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+'; then
              # 生产 tag，保持唯一
              echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT
            else
              # 测试 tag，添加时间戳和 commit SHA
              echo "tag=${TAG_NAME}-${TIMESTAMP}-${SHORT_SHA}" >> $GITHUB_OUTPUT
            fi
            echo "should_comment_pr=false" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "main" ]; then
            # 如果是 main 分支，使用 main-日期-commitSHA（保持唯一，便于追溯）
            DATE=$(date +%Y%m%d)
            echo "tag=main-${DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "should_comment_pr=false" >> $GITHUB_OUTPUT
          else
            # 其他分支，使用当前日期+时间戳+commit SHA+分支名称（保持唯一）
            DATE=$(date +%Y%m%d)
            BRANCH_NAME="${{ github.ref_name }}"
            # 替换分支名称中的 / 为 -，因为 Docker tag 不支持 /
            BRANCH_NAME_SANITIZED=$(echo "$BRANCH_NAME" | tr '/' '-')
            echo "tag=${DATE}-${TIMESTAMP}-${SHORT_SHA}-${BRANCH_NAME_SANITIZED}" >> $GITHUB_OUTPUT
            echo "should_comment_pr=true" >> $GITHUB_OUTPUT
          fi
      - name: Update workflow run name
        run: |
          DOCKER_TAG="${{ steps.set_tag.outputs.tag }}"
          NEW_NAME="Tego Image Nightly - Tag: ${DOCKER_TAG}"
          REPO="${{ github.repository }}"
          RUN_ID="${{ github.run_id }}"
          TOKEN="${{ secrets.GITHUB_TOKEN }}"

          # Output docker_tag as notice and code block for copy button
          echo "::notice title=Docker Tag::Docker tag: ${DOCKER_TAG}"
          echo ""
          echo '```'
          echo "${DOCKER_TAG}"
          echo '```'

          # Try to update workflow run name
          RESPONSE=$(curl -s -w "\n%{http_code}" -X PATCH \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            -d "{\"display_title\": $(echo "$NEW_NAME" | jq -Rs .)}" \
            "https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "204" ]; then
            echo "✓ Workflow run name updated successfully"
          else
            echo "⚠ Failed to update run name (HTTP $HTTP_CODE), but continuing..."
          fi
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/tego-nightly/Dockerfile
          push: true
          tags: |
            tegojs/tego-nightly:${{ steps.set_tag.outputs.tag }}
            tegojs/tego-nightly:latest

  comment-pr:
    runs-on: ubuntu-latest
    needs: docker
    if: needs.docker.outputs.should_comment_pr == 'true'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Find associated PR
        id: find_pr
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          OWNER="${REPO%/*}"
          TOKEN="${{ secrets.GITHUB_TOKEN }}"

          # 使用 GitHub API 查找与当前分支关联的 PR
          PR_RESPONSE=$(curl -s -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${REPO}/pulls?head=${OWNER}:${BRANCH_NAME}&state=open")

          # 使用 jq 解析 JSON，获取第一个 PR 的 number
          PR_NUMBER=$(echo "$PR_RESPONSE" | jq -r '.[0].number // empty')

          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "✓ Found PR #$PR_NUMBER for branch $BRANCH_NAME"
          else
            echo "pr_number=" >> $GITHUB_OUTPUT
            echo "⚠ No PR found for branch $BRANCH_NAME"
          fi
      - name: Comment on PR
        if: steps.find_pr.outputs.pr_number != ''
        run: |
          PR_NUMBER="${{ steps.find_pr.outputs.pr_number }}"
          DOCKER_TAG="${{ needs.docker.outputs.docker_tag }}"
          IMAGE_URL="tegojs/tego-nightly:${DOCKER_TAG}"
          REPO="${{ github.repository }}"
          TOKEN="${{ secrets.GITHUB_TOKEN }}"

          COMMENT=$(cat <<EOF
          ## 🐳 Docker Image Built

          The Docker image has been built and pushed successfully.

          **Image:** \`${IMAGE_URL}\`

          **Pull command:**
          \`\`\`bash
          docker pull ${IMAGE_URL}
          \`\`\`

           **Docker Tag:**
          \`\`\`bash
          ${DOCKER_TAG}
          \`\`\`
          EOF
          )

          # 使用 GitHub API 在 PR 上添加评论
          curl -X POST \
            -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d "{\"body\": $(echo "$COMMENT" | jq -Rs .)}" \
            "https://api.github.com/repos/${REPO}/issues/${PR_NUMBER}/comments"

          echo "✓ Commented on PR #$PR_NUMBER"
