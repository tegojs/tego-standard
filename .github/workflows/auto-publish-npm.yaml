# 本文件与 tego 仓库相同文件保持同步
name: Auto Publish to NPM

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}  # 无 inputs

run-name: "Publish to NPM - Version: ${{ github.ref_name }}"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    # 限制只在 v* tag 上运行（自动 push 已限，手动选 branch 时若非 v* tag 直接跳过）
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Check if tag is on main branch
        id: check_branch
        run: |
          TAG_COMMIT=$(git rev-list -n 1 ${{ github.ref_name }})
          if git branch -r --contains "$TAG_COMMIT" | grep -q 'origin/main'; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
            echo "✓ Tag ${{ github.ref_name }} is on main branch"
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
            echo "⚠ Tag ${{ github.ref_name }} is not on main branch, skipping publish"
          fi

      - uses: MOZGIII/install-ldid-action@v1
        if: steps.check_branch.outputs.on_main == 'true'
        with:
          tag: v2.1.5-procursus7

      - name: Setup pnpm
        if: steps.check_branch.outputs.on_main == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: steps.check_branch.outputs.on_main == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        if: steps.check_branch.outputs.on_main == 'true'
        run: npm install -g npm@^11.5.1

      - name: Verify trusted publishing prerequisites
        if: steps.check_branch.outputs.on_main == 'true'
        run: |
          echo "Node: $(node -v)"
          echo "npm: $(npm -v)"

      - name: Install deps
        if: steps.check_branch.outputs.on_main == 'true'
        run: pnpm install

      - name: Build
        if: steps.check_branch.outputs.on_main == 'true'
        run: pnpm build

      - name: Publish
        if: steps.check_branch.outputs.on_main == 'true'
        id: publish
        run: |
          # 创建临时文件来记录发布结果
          SUCCESS_FILE=$(mktemp)
          FAILED_FILE=$(mktemp)
          OUTPUT_FILE=$(mktemp)

          # 获取所有需要发布的包列表（只获取项目自己的包，排除依赖项）
          echo "获取需要发布的包列表..."

          # 方法1: 从 packages 和 apps 目录中查找包
          > /tmp/all-packages.txt
          for dir in packages apps; do
            if [ -d "$dir" ]; then
              find "$dir" -name "package.json" -type f | while read pkg_file; do
                pkg_name=$(jq -r '.name // empty' "$pkg_file" 2>/dev/null)
                if [ -n "$pkg_name" ] && [ "$pkg_name" != "null" ]; then
                  echo "$pkg_name" >> /tmp/all-packages.txt
                fi
              done
            fi
          done

          # 方法2: 使用 pnpm list 但只获取工作区包（不包括依赖项）
          if [ ! -s /tmp/all-packages.txt ]; then
            echo "尝试使用 pnpm 获取工作区包..."
            pnpm -r list --depth=0 --json 2>/dev/null | jq -r '.[] | select(.name != null and .name != "null" and .path != null) | .name' | sort -u > /tmp/all-packages.txt || true
          fi

          TOTAL_PACKAGES=$(wc -l < /tmp/all-packages.txt | tr -d ' ' || echo "0")
          echo "找到 $TOTAL_PACKAGES 个需要发布的包"

          # 调试：显示找到的包列表
          if [ -s /tmp/all-packages.txt ]; then
            echo "包列表："
            cat /tmp/all-packages.txt | head -10
            if [ "$TOTAL_PACKAGES" -gt 10 ]; then
              echo "... 还有 $((TOTAL_PACKAGES - 10)) 个包"
            fi
          fi

          # 设置允许命令失败但继续执行
          set +e

          # 执行发布并捕获所有输出
          echo "开始发布包到 NPM..."

          # 根据版本自动选择 dist-tag：alpha 预发布使用 alpha，其余使用 latest
          VERSION="${GITHUB_REF_NAME#v}"
          DIST_TAG="latest"
          if echo "$VERSION" | grep -Eq -- '-alpha\.[0-9]+$'; then
            DIST_TAG="alpha"
          fi
          echo "发布版本: $VERSION"
          echo "使用 dist-tag: $DIST_TAG"

          # 使用更精确的发布命令，只发布工作区包
          pnpm -r --filter="./packages/*" --filter="./apps/*" publish --provenance --access public --tag "$DIST_TAG" --no-git-checks 2>&1 | tee "$OUTPUT_FILE"
          PUBLISH_EXIT_CODE=${PIPESTATUS[0]}

          set -e

          # 统一去重工作区包列表，避免后续统计偏差
          sort -u /tmp/all-packages.txt -o /tmp/all-packages.txt 2>/dev/null || true

          # 解析输出：
          # - 成功依据：`+ @scope/pkg@x.y.z`（npm/pnpm 实际发布成功行）
          # - 失败依据：错误行按当前包上下文归因，并提取首条错误原因
          # FAILED_FILE 使用 TSV: package<TAB>reason
          export OUTPUT_FILE SUCCESS_FILE FAILED_FILE
          node - <<'NODE'
          const fs = require('fs')

          const output = fs.readFileSync(process.env.OUTPUT_FILE, 'utf8').split(/\r?\n/)
          const workspace = new Set(
            fs
              .readFileSync('/tmp/all-packages.txt', 'utf8')
              .split(/\r?\n/)
              .map((s) => s.trim())
              .filter(Boolean),
          )

          const success = new Set()
          const failReason = new Map()
          let currentPkg = ''

          const headerReg = /npm notice .*📦\s+((?:@[^/\s]+\/)?[^@\s]+)@[0-9][0-9A-Za-z.-]*/
          const successReg = /^\+\s+((?:@[^/\s]+\/)?[^@\s]+)@[0-9][0-9A-Za-z.-]*/
          const packageWithVersionReg = /((?:@[^/\s]+\/)?[^@\s]+)@[0-9][0-9A-Za-z.-]*/
          const errorReg = /(npm\s+ERR!|\berror\b|\bfailed\b|\bforbidden\b|\bunauthorized\b|\bdenied\b|\bE[0-9]{3}\b|cannot publish|already exists|you cannot publish over)/i

          for (const raw of output) {
            const line = raw.replace(/\x1b\[[0-9;]*m/g, '').trim()
            if (!line) continue

            let m = line.match(headerReg)
            if (m) {
              currentPkg = m[1]
              continue
            }

            m = line.match(successReg)
            if (m) {
              const pkg = m[1]
              if (workspace.has(pkg)) {
                success.add(pkg)
                failReason.delete(pkg)
              }
              continue
            }

            if (!errorReg.test(line)) continue

            let pkg = currentPkg
            if (!pkg) {
              const pm = line.match(packageWithVersionReg)
              if (pm) pkg = pm[1]
            }
            if (!pkg || !workspace.has(pkg) || success.has(pkg) || failReason.has(pkg)) continue

            const reason = line.slice(0, 240)
            failReason.set(pkg, reason || 'Unknown error')
          }

          const successList = [...success].sort((a, b) => a.localeCompare(b))
          const failedList = [...failReason.entries()].sort((a, b) => a[0].localeCompare(b[0]))

          fs.writeFileSync(process.env.SUCCESS_FILE, successList.join('\n') + (successList.length ? '\n' : ''))
          fs.writeFileSync(
            process.env.FAILED_FILE,
            failedList.map(([pkg, reason]) => `${pkg}\t${reason}`).join('\n') + (failedList.length ? '\n' : ''),
          )
          NODE

          # 统计数量
          SUCCESS_COUNT=$(wc -l < "$SUCCESS_FILE" | tr -d ' ' || echo "0")
          FAILED_COUNT=$(wc -l < "$FAILED_FILE" | tr -d ' ' || echo "0")

          # 读取包列表（成功包列表、失败包列表、失败详情）
          SUCCESS_PACKAGES=$(cat "$SUCCESS_FILE" 2>/dev/null || true)
          FAILED_PACKAGES=$(cut -f1 "$FAILED_FILE" 2>/dev/null || true)
          FAILED_DETAILS=$(awk -F '\t' '{print $1": "$2}' "$FAILED_FILE" 2>/dev/null || true)

          # 输出到 GitHub outputs
          echo "success_count=$SUCCESS_COUNT" >> "$GITHUB_OUTPUT"
          echo "failed_count=$FAILED_COUNT" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          {
            echo "success_packages<<EOF"
            echo "$SUCCESS_PACKAGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "failed_packages<<EOF"
            echo "$FAILED_PACKAGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "failed_details<<EOF"
            echo "$FAILED_DETAILS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # 生成汇总通知和可读 Markdown 总结
          if [ "$SUCCESS_COUNT" -gt 0 ] && [ "$FAILED_COUNT" -eq 0 ]; then
            echo "::notice title=✅ NPM 发布成功::dist-tag=$DIST_TAG，成功发布 $SUCCESS_COUNT 个包"
          elif [ "$SUCCESS_COUNT" -gt 0 ] && [ "$FAILED_COUNT" -gt 0 ]; then
            echo "::warning title=⚠️ NPM 发布部分成功::dist-tag=$DIST_TAG，成功 $SUCCESS_COUNT，失败 $FAILED_COUNT"
          elif [ "$FAILED_COUNT" -gt 0 ]; then
            echo "::error title=❌ NPM 发布失败::dist-tag=$DIST_TAG，失败 $FAILED_COUNT 个包"
          else
            # 既没有成功也没有失败的情况（通常表示发布命令执行异常）
            if [ "$PUBLISH_EXIT_CODE" -ne 0 ]; then
              echo "::warning title=⚠️ NPM 发布异常::发布命令执行失败 (exit code: $PUBLISH_EXIT_CODE)，无法解析发布结果"
            else
              echo "::warning title=⚠️ NPM 发布无结果::未找到任何发布的包或发布结果"
            fi
          fi

          {
            echo "### NPM Publish Summary"
            echo ""
            echo "- Dist Tag: $DIST_TAG"
            echo "- Publish Exit Code: $PUBLISH_EXIT_CODE"
            echo "- Success Count: $SUCCESS_COUNT"
            echo "- Failed Count: $FAILED_COUNT"
            echo ""
            echo "#### ✅ Success Packages"
            if [ "$SUCCESS_COUNT" -gt 0 ]; then
              sed 's/^/- /' "$SUCCESS_FILE"
            else
              echo "- (none)"
            fi
            echo ""
            echo "#### ❌ Failed Packages"
            if [ "$FAILED_COUNT" -gt 0 ]; then
              awk -F '\t' '{print "- "$1" : "$2}' "$FAILED_FILE"
            else
              echo "- (none)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish Summary
        if: always() && steps.check_branch.outputs.on_main == 'true'
        run: |
          echo "=== NPM Publish Summary ==="
          echo "Dist Tag: ${{ steps.publish.outputs.dist_tag || 'unknown' }}"
          echo "Success Count: ${{ steps.publish.outputs.success_count || '0' }}"
          echo "Failed Count: ${{ steps.publish.outputs.failed_count || '0' }}"
          echo ""

          echo "Success Packages:"
          if [ -n "${{ steps.publish.outputs.success_packages }}" ]; then
            echo "${{ steps.publish.outputs.success_packages }}"
          else
            echo "(none)"
          fi
          echo ""

          echo "Failed Packages (with reasons):"
          if [ -n "${{ steps.publish.outputs.failed_details }}" ]; then
            echo "${{ steps.publish.outputs.failed_details }}"
          else
            echo "(none)"
          fi
          echo ""

          SUCCESS_COUNT="${{ steps.publish.outputs.success_count || '0' }}"
          FAILED_COUNT="${{ steps.publish.outputs.failed_count || '0' }}"

          # 确保至少生成一个汇总通知
          if [ -z "$SUCCESS_COUNT" ] || [ -z "$FAILED_COUNT" ]; then
            echo "::notice title=⚠️ NPM 发布结果未知::无法获取发布统计信息"
          else
            TOTAL=$((SUCCESS_COUNT + FAILED_COUNT))
            if [ "$TOTAL" -eq 0 ]; then
              echo "::notice title=⚠️ NPM 发布无结果::未执行任何包的发布"
            fi
          fi
